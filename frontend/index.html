<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>芜湖高铁通达性地图</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/nouislider/15.7.1/nouislider.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="map"></div>

    <!-- Loading bar across top -->
    <div id="loading-bar"><div class="progress-fill"></div></div>

    <!-- Top bar overlay -->
    <header id="topbar">
        <div class="topbar-title">
            <h1>芜湖高铁通达性地图</h1>
            <div class="subtitle" id="data-subtitle">数据加载中…</div>
        </div>
        <div id="status">
            <span id="status-time">0 分钟内</span>
            <span id="status-count">0 站可达</span>
        </div>
    </header>

    <!-- Sidebar with reachable station list -->
    <aside id="sidebar" class="collapsed">
        <div class="sidebar-header">
            <h2>可达车站</h2>
            <button id="close-sidebar" aria-label="收起">×</button>
        </div>
        <div class="sidebar-search">
            <input type="search" id="station-search" placeholder="搜索站名或城市…" autocomplete="off" spellcheck="false" />
            <span id="search-count" class="search-count"></span>
        </div>
        <ul id="station-list"></ul>
    </aside>

    <button id="open-sidebar" aria-label="展开侧栏">≡</button>

    <!-- Train detail panel — shown when a route is selected -->
    <aside id="detail-panel" class="hidden">
        <div class="detail-header">
            <div class="detail-title">
                <h2 id="detail-name">—</h2>
                <div id="detail-meta">—</div>
            </div>
            <button id="close-detail" aria-label="关闭详情">×</button>
        </div>
        <div class="detail-stops-header">
            <span>完整经停</span>
        </div>
        <ol id="detail-stops"></ol>
    </aside>

    <!-- Bottom: preset buttons + time slider -->
    <footer id="controls">
        <div class="slider-row">
            <div class="preset-row" id="preset-row" role="group" aria-label="快速跳转">
                <button type="button" class="preset-btn" data-min="60">1h</button>
                <button type="button" class="preset-btn" data-min="120">2h</button>
                <button type="button" class="preset-btn" data-min="240">4h</button>
                <button type="button" class="preset-btn" data-min="480">8h</button>
                <button type="button" class="preset-btn" data-min="720">12h</button>
                <button type="button" class="preset-btn" data-min="1440">24h</button>
                <button type="button" class="preset-btn" data-min="2428">40h</button>
            </div>
            <label for="time-slider" class="slider-label">
                <span id="time-display">0</span> 分钟内可达
            </label>
            <div id="time-slider"></div>
        </div>
    </footer>

    <script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/nouislider/15.7.1/nouislider.min.js"></script>
    <script src="coordTransform.js"></script>
    <script src="app.js" defer></script>
</body>
</html>
