<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>芜湖高铁通达性地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="map"></div>

    <!-- Loading bar across top -->
    <div id="loading-bar"><div class="progress-fill"></div></div>

    <!-- Top bar overlay -->
    <header id="topbar">
        <h1>芜湖高铁通达性地图</h1>
        <div id="status">
            <span id="status-time">0 分钟内</span>
            <span id="status-count">0 站可达</span>
        </div>
    </header>

    <!-- Sidebar with reachable station list -->
    <aside id="sidebar" class="collapsed">
        <div class="sidebar-header">
            <h2>可达车站</h2>
            <button id="close-sidebar" aria-label="收起">×</button>
        </div>
        <ul id="station-list"></ul>
    </aside>

    <button id="open-sidebar" aria-label="展开侧栏">≡</button>

    <!-- Bottom: time slider -->
    <footer id="controls">
        <div class="slider-row">
            <label for="time-slider">
                <span id="time-display">0</span> 分钟内可达
            </label>
            <input id="time-slider" type="range" min="0" max="2410" step="1" value="0" />
            <div class="tick-row">
                <span>0</span>
                <span>60</span>
                <span>120</span>
                <span>240</span>
                <span>360</span>
                <span>480</span>
                <span>600</span>
                <span>720</span>
                <span>960</span>
                <span>1200</span>
                <span>1440</span>
                <span>1920</span>
                <span>2410</span>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js" defer></script>
</body>
</html>
